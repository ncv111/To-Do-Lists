# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    <!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life RPG</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center"><div id="app" class="w-full max-w-2xl p-4"><!-- LOGIN --><div id="loginScreen" class="bg-gray-800 p-6 rounded-2xl">
<h1 class="text-2xl mb-4">Login / Create Account</h1>
<input id="username" placeholder="Username" class="w-full p-2 mb-2 text-black rounded">
<button onclick="login()" class="bg-blue-500 px-4 py-2 rounded w-full">Enter Game</button>
</div><!-- GAME --><div id="gameScreen" class="hidden">
<h1 class="text-3xl mb-4">🎮 Life RPG</h1><div class="bg-gray-800 p-4 rounded mb-4">
<p>Level: <span id="level"></span></p>
<p>XP: <span id="xp"></span>/<span id="xpNeeded"></span></p>
<p>🔥 Streak: <span id="streak"></span> days</p>
</div><div class="bg-gray-800 p-4 rounded mb-4">
<h2 class="font-bold">Stats</h2>
<p>💪 Strength: <span id="str"></span></p>
<p>🧠 Intelligence: <span id="int"></span></p>
<p>💰 Wealth: <span id="money"></span></p>
<p>🧹 Order: <span id="order"></span></p>
</div><div class="flex gap-2 mb-4">
<input id="taskInput" placeholder="New quest" class="flex-1 p-2 text-black rounded">
<select id="difficulty" class="text-black rounded">
<option value="10">Easy</option>
<option value="25">Medium</option>
<option value="50">Hard</option>
</select>
<select id="stat" class="text-black rounded">
<option value="str">Strength</option>
<option value="int">Intelligence</option>
<option value="money">Wealth</option>
<option value="order">Order</option>
</select>
<button onclick="addTask()" class="bg-green-500 px-3 rounded">Add</button>
</div><ul id="tasks" class="space-y-2"></ul><div class="bg-gray-800 p-4 rounded mt-4">
<h2 class="font-bold">🏆 Rewards Shop</h2>
<button onclick="reward('Take a break')" class="bg-purple-500 px-3 py-1 rounded">Break (Lvl 2)</button>
<button onclick="reward('Treat yourself')" class="bg-purple-500 px-3 py-1 rounded">Treat (Lvl 5)</button>
<p id="rewardMsg" class="mt-2"></p>
</div></div>
</div><script>
let user;
let data;

function defaultData(){
return {
xp:0, level:1, xpNeeded:100, streak:0,
str:0,int:0,money:0,order:0,
tasks:[], lastLogin:null
};
}

function login(){
user=document.getElementById('username').value;
if(!user) return;

let saved=localStorage.getItem(user);
data=saved?JSON.parse(saved):defaultData();

checkStreak();

document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('gameScreen').classList.remove('hidden');

render();
}

function save(){
localStorage.setItem(user, JSON.stringify(data));
}

function checkStreak(){
let today=new Date().toDateString();
if(data.lastLogin!==today){
data.streak++;
data.lastLogin=today;
}
}

function render(){
document.getElementById('xp').innerText=data.xp;
document.getElementById('level').innerText=data.level;
document.getElementById('xpNeeded').innerText=data.xpNeeded;
document.getElementById('streak').innerText=data.streak;

document.getElementById('str').innerText=data.str;
document.getElementById('int').innerText=data.int;
document.getElementById('money').innerText=data.money;
document.getElementById('order').innerText=data.order;

let list=document.getElementById('tasks');
list.innerHTML='';

data.tasks.forEach((t,i)=>{
let li=document.createElement('li');
li.className="bg-gray-700 p-2 flex justify-between rounded";
li.innerHTML=`${t.text} <button onclick="completeTask(${i})" class="bg-green-500 px-2 rounded">✔</button>`;
list.appendChild(li);
});

save();
}

function addTask(){
let text=document.getElementById('taskInput').value;
let xp=parseInt(document.getElementById('difficulty').value);
let stat=document.getElementById('stat').value;

if(!text) return;

data.tasks.push({text,xp,stat});
document.getElementById('taskInput').value='';
render();
}

function completeTask(i){
let t=data.tasks[i];
data.xp+=t.xp;
data[t.stat]+=t.xp;

data.tasks.splice(i,1);

if(data.xp>=data.xpNeeded){
data.xp-=data.xpNeeded;
data.level++;
data.xpNeeded=Math.floor(data.xpNeeded*1.2);
alert("LEVEL UP!");
}

render();
}

function reward(msg){
if(data.level<2){
document.getElementById('rewardMsg').innerText="Level too low!";
return;
}

document.getElementById('rewardMsg').innerText=msg;
}
</script></body>
</html>
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
